<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" />
    <title>DripCheck.</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main class="app">
      <h1>DripCheck</h1>
      <p>Weather for nerds.</p>
      <div class="search">
        <label for="cityInput">Enter Your City</label>
        <input type="text" id="cityInput" placeholder="Enter city" />
        <label for="stateInput">Enter Your State</label>
        <input type="text" id="stateInput" placeholder="Enter state code" />
        <button id="searchBtn">Search</button>
      </div>
      <div id="weatherResult">
        <p>Weather will appear here</p>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
