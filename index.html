<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DripCheck.</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0ea5e9" />
  </head>

  <body>
    <main class="app">
      <h1>DripCheck</h1>
      <p class="tagline">Weather for nerds.</p>
      <div class="search">
        <input type="text" id="cityInput" placeholder="Enter city" />
        <input type="text" id="stateInput" placeholder="Enter state code" />
        <button id="searchBtn">Search</button>
        <button id="locationBtn" class="secondary-btn">Use My Location</button>
      </div>
      <div id="weatherResult">
        <p>Search a city or allow location access to see the forecast.</p>
        <p>Weather will appear here</p>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
